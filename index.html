<section class="why">
  <div class="wrap">
    <h2 class="sec-title">「わかっている」を、<br>「できる」に変える時間。</h2>
    <p class="sec-lead">本を読み、研修を受けても、自分のセッションは録って見返さなければ変わらない。この合宿は、安海のデモを間近で見て、すぐに自分で試し、その場でフィードバックを受ける——その往復を2日間繰り返す場です。</p>
    <div class="cards">
      <div class="card">
        <div class="num">一</div>
        <h3>MCCのデモ・解説</h3>
        <p>20年以上MCCを保持する安海が、実際にセッションを行い、何を見て、なぜそう関わったのかを解きほぐします。型ではなく、その場の選択を見る時間。</p>
      </div>
      <div class="card">
        <div class="num">二</div>
        <h3>相互セッション練習</h3>
        <p>2人1組でコーチ役・クライアント役を交代しながら実践。少人数だからこそ、全員が何度もセッションの場に立てます。</p>
      </div>
      <div class="card">
        <div class="num">三</div>
        <h3>ビデオフィードバック</h3>
        <p>セッションを録画し、自分の関わりを客観的に見返す。気づきにくい癖や強みを、安海と仲間の視点から言語化します。</p>
      </div>
    </div>

    <div class="reveal">
      <span class="tag">特別お披露目</span>
      <h3>AIセッションフィードバックアプリ</h3>
      <p>セッションを録音・分析し、複数のセッションを比較できるAIセッションフィードバックアプリを、本合宿で初めてお披露目します。人の目によるフィードバックと、AIによる客観的な分析。両方の視点から、自分のコーチングを見つめ直せます。</p>
    </div>
  </div>
</section>

<section class="coach">
  <div class="wrap">
    <h2 class="sec-title">安海 将広</h2>
    <p class="sec-lead" style="color:var(--ivory-dim)">有限会社以心伝心 代表取締役 ／ ICFマスター認定コーチ(MCC)</p>
    <div class="coach-grid">
      <div class="coach-stats">
        <div class="coach-stat"><div class="big">20<small>年以上</small></div><div class="cap">MCCとしての歩み</div></div>
        <div class="coach-stat"><div class="big">15,000<small>時間以上</small></div><div class="cap">コーチングの実践時間</div></div>
        <div class="coach-stat"><div class="big">MCC</div><div class="cap">ICF最高位資格</div></div>
      </div>
      <div class="coach-body">
        <h3>「教える」のではなく、<br>「引き出す」を体感する。</h3>
        <p>企業研修から個人向けメンターコーチングまで、数多くのコーチの成長に伴走してきました。この合宿では、答えを渡すのではなく、皆さんがすでに持っている力に気づいてもらうことを大切にしています。</p>
        <p>日常から少し離れた逗子の地で、自分のコーチングを見つめ直しに来てください。</p>
      </div>
    </div>
  </div>
</section>

<script>
(function(){
  var form = document.getElementById('applyForm');
  var done = document.getElementById('applyDone');
  if(!form) return;

  function emailOk(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()); }

  function validate(){
    var ok = true;
    form.querySelectorAll('.ff[data-req]').forEach(function(ff){
      var inp = ff.querySelector('input, select');
      var req = ff.getAttribute('data-req');
      var v = inp.value.trim();
      var good = (req === 'email') ? emailOk(v) : v.length > 0;
      ff.classList.toggle('bad', !good);
      if(!good) ok = false;
    });
    var checks = form.querySelectorAll('#chkBox input[type=checkbox]');
    var allChecked = Array.prototype.every.call(checks, function(c){ return c.checked; });
    document.getElementById('chkBox').classList.toggle('bad', !allChecked);
    if(!allChecked) ok = false;
    return ok;
  }

  window.__submitted = false;
  function showThanks(){
    if(!window.__submitted) return;
    form.style.display = 'none';
    done.style.display = 'block';
    done.scrollIntoView({ behavior:'smooth', block:'center' });
  }
  var hf = document.getElementById('hidden_iframe');
  if(hf) hf.addEventListener('load', showThanks);

  form.addEventListener('submit', function(e){
    if(!validate()){
      e.preventDefault();
      var bad = form.querySelector('.bad');
      if(bad) bad.scrollIntoView({ behavior:'smooth', block:'center' });
      return false;
    }
    window.__submitted = true;
  });

  form.querySelectorAll('input, select').forEach(function(el){
    el.addEventListener('input', function(){
      var ff = el.closest('.ff'); if(ff) ff.classList.remove('bad');
    });
  });
  form.querySelectorAll('#chkBox input').forEach(function(c){
    c.addEventListener('change', function(){ document.getElementById('chkBox').classList.remove('bad'); });
  });
})();
</script>
<script>
/* 残席表示（Apps Scriptウェブアプリから現在の残席を取得） */
(function(){
  var EXEC='https://script.google.com/macros/s/AKfycbwYHwv86FcOW2Ly7lmLbLOxgw54igfl0hCIO37tk4jTBfiUDmptXglyqh7KTl371pPMXQ/exec';
  window.__seats=function(d){
    if(!d) return;
    var rem=d.remaining, cap=d.capacity, full=d.full;
    var seats=document.getElementById('seats');
    if(seats){
      if(full){
        seats.textContent='満席（受付を終了しました）';
        seats.classList.add('full');
        var btn=document.querySelector('#applyForm .submit');
        if(btn){ btn.disabled=true; btn.textContent='受付を終了しました'; btn.style.opacity='.55'; btn.style.cursor='not-allowed'; }
      }else{
        seats.innerHTML='<span class="nb">先着'+cap+'名</span> <span class="nb">（残り '+rem+'名）</span> <span class="nb">申込締切 7月8日（火）</span>';
      }
    }
    var hero=document.getElementById('heroSeats');
    if(hero){ hero.innerHTML = full ? '満席' : '残り'+rem+'名<small>先着順</small>'; }
    var capEl=document.getElementById('capSeats');
    if(capEl){ capEl.innerHTML = full ? '満席<small class="nb">定員'+cap+'名</small>' : '残り'+rem+'名<small class="nb">定員'+cap+'名・先着順</small>'; }
    var sl=document.getElementById('stickyLink');
    if(sl){ if(full){ sl.textContent='満席（受付を終了しました）'; sl.style.background='#5a6877'; sl.style.color='#fff'; sl.removeAttribute('href'); } else { sl.textContent='残り'+rem+'名 ・ 申し込む'; } }
  };
  var s=document.createElement('script');
  s.src=EXEC+'?callback=__seats&t='+Date.now();
  s.onerror=function(){};
  document.body.appendChild(s);
  var apply=document.getElementById('apply'), sticky=document.getElementById('stickyCta');
  if(apply&&sticky&&'IntersectionObserver' in window){
    new IntersectionObserver(function(es){ es.forEach(function(e){ sticky.classList.toggle('hide', e.isIntersecting); }); },{threshold:0.04}).observe(apply);
  }
})();
</script>
